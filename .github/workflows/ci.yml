name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

permissions:
  contents: write

env:
  # default repo names (overridden when DOCKERHUB_USERNAME secret is set)
  BACKEND_REPO: ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-backend', secrets.DOCKERHUB_USERNAME) || 'skillpulse-backend' }}
  FRONTEND_REPO: ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-frontend', secrets.DOCKERHUB_USERNAME) || 'skillpulse-frontend' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install deps (backend)
        working-directory: ./backend
        run: |
          go mod download

      - name: Tidy dependencies (backend)
        working-directory: ./backend
        run: |
          go mod tidy

      - name: Run backend tests
        working-directory: ./backend
        run: |
          go test ./...

      - name: Auto format (gofmt)
        working-directory: ./backend
        run: |
          gofmt -w .
          git diff --exit-code || (echo 'Code was reformatted by gofmt, please commit changes' && exit 1)

      - name: Set image tag
        id: tag
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ env.BACKEND_REPO }}:latest
            ${{ env.BACKEND_REPO }}:${{ steps.tag.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ env.FRONTEND_REPO }}:latest
            ${{ env.FRONTEND_REPO }}:${{ steps.tag.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update backend k8s manifest image
        run: |
          sed -i "s|image: .*skillpulse-backend:.*|image: ${{ env.BACKEND_REPO }}:${{ steps.tag.outputs.sha_short }}|" k8s/20-backend.yaml

      - name: Update frontend k8s manifest image
        run: |
          sed -i "s|image: .*skillpulse-frontend:.*|image: ${{ env.FRONTEND_REPO }}:${{ steps.tag.outputs.sha_short }}|" k8s/30-frontend.yaml

      - name: Commit updated manifests
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/20-backend.yaml k8s/30-frontend.yaml
          git diff --staged --quiet || git commit -m "ci: update k8s images to ${{ steps.tag.outputs.sha_short }} [skip ci]"
          git push
