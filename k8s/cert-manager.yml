# cert-manager ClusterIssuer for Let's Encrypt TLS certificates.
# Uses HTTP-01 validation via Gateway API — cert-manager creates a temporary
# HTTPRoute to serve the ACME challenge on port 80.
# Prerequisites: cert-manager installed with --set config.enableGatewayAPI=true
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: aakashrajarnav@gmail.com
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: skillpulse-gateway
                namespace: skillpulse

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: skillpulse-tls
  namespace: skillpulse
spec:
  secretName: skillpulse-tls   # must match Gateway reference
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - 13.201.53.182.nip.io     # must match your Gateway hostname
